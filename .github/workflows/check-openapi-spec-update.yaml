name: Check API Docs Update
'on':
  schedule:
  - cron: '* 3 * * *'
  workflow_dispatch: null
permissions:
  contents: write
env:
  DEFAULT_BRANCH: main
jobs:
  check-and-update:
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'playground-nils' }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Set up Git
      run: 'git config --global user.name "github-actions[bot]"

        git config --global user.email "github-actions[bot]@users.noreply.github.com"

        '
    - name: Download redoc_static.html and redoc-static-internal.html from GitLab
      env:
        GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
      run: "PROJECT_PATH=\"devrel/docs/api-site\"\nREF=\"main\"\n\n# URL-encode path\
        \ to the project (replace `/` by `%2F`)\n# @todo switch this to using the\
        \ python method so we're consistent?\nPROJECT_ENCODED=$(echo \"$PROJECT_PATH\"\
        \ | sed 's/\\//%2F/g')\n\n# Download into shared data using the GitLab API\n\
        # @todo should we also copy over the stylesheet? or should the version in\
        \ docs be canonical?\ncurl --header \"PRIVATE-TOKEN: $GITLAB_TOKEN\" \\\n\
        \  --output shared/pages/api.html \\\n  \"https://lab.plat.farm/api/v4/projects/${PROJECT_ENCODED}/repository/files/$(python3\
        \ -c \"import urllib.parse; print(urllib.parse.quote('web/redoc-static.html',safe=''))\"\
        )/raw?ref=${REF}\"\n# @todo let's refactor this to be more concise. maybe\
        \ just retrieve everything in the directory?\ncurl --header \"PRIVATE-TOKEN:\
        \ $GITLAB_TOKEN\" \\\n  --output shared/pages/openapispec-upsun.json \\\n\
        \  \"https://lab.plat.farm/api/v4/projects/${PROJECT_ENCODED}/repository/files/$(python3\
        \ -c \"import urllib.parse; print(urllib.parse.quote('web/openapispec-upsun.json',safe=''))\"\
        )/raw?ref=${REF}\"\n# @todo see above\ncurl --header \"PRIVATE-TOKEN: $GITLAB_TOKEN\"\
        \ \\\n  --output shared/pages/openapispec-upsun.yaml \\\n  \"https://lab.plat.farm/api/v4/projects/${PROJECT_ENCODED}/repository/files/$(python3\
        \ -c \"import urllib.parse; print(urllib.parse.quote('web/openapispec-upsun.yaml',safe=''))\"\
        )/raw?ref=${REF}\"\n\n# @todo should we also copy over the stylesheet? or\
        \ should the version in docs be canonical?\ncurl --header \"PRIVATE-TOKEN:\
        \ $GITLAB_TOKEN\" \\\n  --output shared/pages/api-internal.html \\\n  \"https://lab.plat.farm/api/v4/projects/${PROJECT_ENCODED}/repository/files/$(python3\
        \ -c \"import urllib.parse; print(urllib.parse.quote('web/redoc-static-internal.html',safe=''))\"\
        )/raw?ref=${REF}\"\n# @todo let's refactor this to be more concise. maybe\
        \ just retrieve everything in the directory?\ncurl --header \"PRIVATE-TOKEN:\
        \ $GITLAB_TOKEN\" \\\n  --output shared/pages/openapispec-upsun-internal.json\
        \ \\\n  \"https://lab.plat.farm/api/v4/projects/${PROJECT_ENCODED}/repository/files/$(python3\
        \ -c \"import urllib.parse; print(urllib.parse.quote('web/openapispec-upsun-internal.json',safe=''))\"\
        )/raw?ref=${REF}\"\n# @todo see above\ncurl --header \"PRIVATE-TOKEN: $GITLAB_TOKEN\"\
        \ \\\n  --output shared/pages/openapispec-upsun-internal.yaml \\\n  \"https://lab.plat.farm/api/v4/projects/${PROJECT_ENCODED}/repository/files/$(python3\
        \ -c \"import urllib.parse; print(urllib.parse.quote('web/openapispec-upsun-internal.yaml',safe=''))\"\
        )/raw?ref=${REF}\"\n"
    - name: Create Pull Request if changes
      id: create-pr
      uses: peter-evans/create-pull-request@v6
      with:
        token: ${{ secrets.WORKFLOW_TOKEN }}
        commit-message: Update API Docs
        body: This PR updates the API Docs.
        author: ${{ github.actor }} <${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com>
        signoff: false
        draft: false
        delete-branch: true
        branch: update-api-doc
        title: '[API-BOT] Update API Docs'
        base: main
        labels: 'report

          automated pr

          '
        add-paths: 'shared/pages

          '
